name: CoC API Watcher

on:
  schedule:
    - cron: '*/5 * * * *' # Runs exactly every 5 minutes
  workflow_dispatch: # Adds a manual play button so you can test it

jobs:
  check-war:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Gives the bot permission to save the JSON file to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Watcher Script
        env:
          COC_TOKEN: ${{ secrets.COC_TOKEN }} # Pulls your hidden token from the vault!
        run: python watcher.py

      - name: Commit and Push War Data
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add warEnded_*.json || true
          
          # Only save to the repo if a new JSON file was actually created
          if ! git diff --staged --quiet; then
            git commit -m "Automated: Archived finished war stats"
            git push
          else
            echo "No new war data to commit."
          fi
